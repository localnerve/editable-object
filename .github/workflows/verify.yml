name: Verify
on:
  pull_request:
    branches: [ main ]

jobs:
  verify:

    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
      with:
        node-version: ${{ matrix.node-version }}
    - name: Setup Google Chrome v149 # WATCH: match with axe-cli prerequisites
      uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # 2.1.2
      id: setup-chrome
      with:
        chrome-version: '149'
        install-dependencies: true
    - name: Export Chrome Binary Path
      run: echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
    - run: npm ci
    # - run: npx browser-driver-manager install chrome
    - name: Run Lint and Test
      run: npm run lint && npm test:ci